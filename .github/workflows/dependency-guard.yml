name: Dependency Guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-guard:
    name: Dependency Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit package signatures
        run: npm audit signatures

      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high

      - name: Review dependency changes
        if: ${{ github.event.repository.visibility == 'public' || vars.ENABLE_DEPENDENCY_REVIEW == 'true' }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Dependency review unavailable
        if: ${{ github.event.repository.visibility != 'public' && vars.ENABLE_DEPENDENCY_REVIEW != 'true' }}
        run: >
          echo "Skipping dependency-review-action because this repository is private and
          ENABLE_DEPENDENCY_REVIEW is not true; npm signature and vulnerability audits
          above remain required."
